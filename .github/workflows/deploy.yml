name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Go binary (Linux amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o brain ./cmd/brain

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy binary
        run: |
          scp -i ~/.ssh/deploy_key brain ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/ai-management-brain/brain

      - name: Deploy frontend
        run: |
          scp -i ~/.ssh/deploy_key -r frontend/dist ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/ai-management-brain/frontend/dist

      - name: Deploy configs
        run: |
          scp -i ~/.ssh/deploy_key -r configs ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/ai-management-brain/configs

      - name: Deploy MCP server source
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /home/${{ secrets.SERVER_USER }}/ai-management-brain/mcp-server/src"
          scp -i ~/.ssh/deploy_key mcp-server/package.json mcp-server/package-lock.json mcp-server/tsconfig.json mcp-server/Dockerfile \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/ai-management-brain/mcp-server/
          scp -i ~/.ssh/deploy_key -r mcp-server/src \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/ai-management-brain/mcp-server/

      - name: Deploy infra files
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/ai-management-brain/docker-compose.prod.yml
          scp -i ~/.ssh/deploy_key frontend/nginx.conf ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/ai-management-brain/frontend/nginx.conf

      - name: Restart containers
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd /home/${{ secrets.SERVER_USER }}/ai-management-brain && docker compose -f docker-compose.prod.yml up -d --build"

      - name: Health check
        run: |
          sleep 10
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "curl -sf http://localhost/healthz || exit 1"
