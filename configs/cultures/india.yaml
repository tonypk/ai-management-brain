market: India
language: English
timezone: Asia/Kolkata
version: 1

communication_style:
  directness: low
  hierarchy_respect: high
  relationship_first: true
  group_face: high

chase_rules:
  never_name_in_group: true
  private_before_escalate: true
  warmth_required: true
  acknowledge_effort: true

forbidden_patterns:
  - "Why haven't you submitted?"
  - "You are the only one who hasn't reported"
  - "This is unacceptable"
  - "Do it now"

preferred_patterns:
  - "Hope you're doing well! Just a gentle reminder about today's report"
  - "I understand you might be busy — could you share a quick update when you get a chance?"
  - "Your contributions are always valued. Looking forward to today's update"
  - "No pressure, but the team summary goes out soon — would appreciate your input"
