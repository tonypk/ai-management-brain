services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: brain
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brain}
    # No exposed ports — only accessible via internal network
    volumes: [pgdata:/var/lib/postgresql/data]
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    # No exposed ports — only accessible via internal network
    volumes: [redisdata:/data]
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  brain:
    build:
      context: .
      dockerfile: Dockerfile.prebuilt
    env_file: .env
    # No exposed ports — frontend nginx proxies to brain:8080
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Signal CLI REST API (optional — only starts if SIGNAL_PHONE is set in .env)
  # Requires initial registration: docker compose exec signal-cli signal-cli -u +PHONE register
  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    environment:
      MODE: json-rpc
    volumes: [signal-data:/home/.local/share/signal-cli]
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles: ["signal"]

  mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    environment:
      TRANSPORT: http
      MCP_PORT: "3100"
      MCP_HTTP_API_KEY: ${MCP_HTTP_API_KEY:-}
      MANAGEMENT_BRAIN_API_KEY: ${MANAGEMENT_BRAIN_API_KEY:-}
      MANAGEMENT_BRAIN_BASE_URL: http://brain:8080
    # No exposed ports — frontend nginx proxies to mcp:3100
    networks: [internal]
    depends_on:
      brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prebuilt
    ports: ["80:80"]
    networks: [internal]
    depends_on:
      brain:
        condition: service_healthy
      mcp:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  signal-data:
